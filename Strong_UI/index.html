<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TIGER UI — 首页</title>
  <style>
    :root{
      --bg: #0f1724;
      --card: #0b1220;
      --accent: #ff7a59;
      --muted: #9aa4b2;
      --glass: rgba(255,255,255,0.04);
      --glass-2: rgba(255,255,255,0.03);
      --shadow: 0 8px 24px rgba(2,6,23,0.6);
      --radius: 12px;
      --maxwidth: 1100px;
    }
    html,body{height:100%;margin:0;font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;background:linear-gradient(180deg,#071226 0%, #0b1b2b 100%);color:#e6eef6}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px 40px 60px 40px}
    .shell{width:100%;max-width:var(--maxwidth);text-align:center}

    /* 标题 */
    .title{font-weight:800;letter-spacing:6px;font-size:52px;margin:0;color:var(--accent);text-shadow:0 6px 40px rgba(255,122,89,0.12)}
    .subtitle{margin-top:8px;color:var(--muted);font-size:14px}

    /* 卡片网格 */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:28px}
    .card{background:linear-gradient(180deg,var(--glass),var(--glass-2));border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:flex-start}
    .card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(2,6,23,0.7);border-color:rgba(255,122,89,0.12)}
    .card:focus{outline:2px solid rgba(255,122,89,0.16);outline-offset:4px}

    .card h3{margin:0;font-size:18px}
    .card p{margin:8px 0 0;color:var(--muted);font-size:13px}
    .card .meta{margin-top:auto;display:flex;gap:8px;align-items:center}
    .chip{background:rgba(255,255,255,0.03);padding:6px 10px;border-radius:999px;font-size:12px;color:var(--muted)}

    /* 图标样式 */
    .icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));display:flex;align-items:center;justify-content:center;margin-right:12px}
    .row{display:flex;align-items:center}

    /* 顶部说明小按钮 */
    .topbar{display:flex;gap:10px;justify-content:center;margin-top:18px}
    .small-btn{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:8px 12px;border-radius:8px;font-size:13px}

    /* 响应处理 */
    @media (max-width:520px){.title{font-size:40px}.grid{gap:14px}}

    /* 无效链接样式 */
    .card.disabled{opacity:0.45;pointer-events:none}

    /* 开发者名单样式（复用卡片风格） */
    .dev-toggle{position:fixed;left:20px;bottom:20px;min-width:160px;z-index:60;cursor:pointer}
    .dev-toggle .row{align-items:center}
    .dev-toggle .icon{width:40px;height:40px;border-radius:8px;margin-right:10px}
    .dev-modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,0.6);z-index:70;opacity:0;pointer-events:none;transition:opacity .18s ease}
    .dev-modal.open{opacity:1;pointer-events:auto}
    .dev-modal .card{max-width:420px;min-width:260px;position:relative}
    .dev-modal .close-btn{position:absolute;top:10px;right:10px;background:transparent;border:0;color:var(--muted);font-size:16px;cursor:pointer;padding:6px;border-radius:6px}
    .dev-list{padding-top:8px;padding-right:48px}
    .dev-list p{margin:6px 0;color:var(--muted);font-size:14px}

  </style>
</head>
<body>
  <div class="dev-toggle card" id="devToggle" role="button" tabindex="0" aria-haspopup="dialog" aria-controls="devModal">
    <div class="row">
      <div class="icon">👥</div>
      <div>
        <h3 style="font-size:15px;margin:0">开发者名单</h3>
        <p style="margin:6px 0 0;font-size:12px;color:var(--muted)">查看项目维护者</p>
      </div>
    </div>
  </div>

  <div class="dev-modal" id="devModal" role="dialog" aria-hidden="true" aria-labelledby="devTitle">
    <div class="card" role="document" aria-modal="true">
      <div class="row" style="width:100%;">
        <div>
          <h3 id="devTitle">开发者名单</h3>
          <div class="dev-list" id="devList"></div>
        </div>
        <button class="close-btn" id="devClose" aria-label="关闭开发者名单">✖</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <main class="shell" role="main">
      <div class="title">TIGER UI</div>
      <div class="subtitle">点击下方卡片以打开对应页面</div>

      <div class="topbar" aria-hidden="true">
        <button class="small-btn" onclick="location.reload()">刷新页面</button>
 
      </div>



      <section class="grid" aria-label="主导航">
        <!-- 卡片：使用文件名作为标题 -->

        <a class="card" href="text.html" id="link-文本">
          <div class="row">
            <div class="icon">🔤</div>
            <div>
              <h3>文本校正</h3>
              <p>文本相关工具和示例</p>
            </div>
          </div>
          <div class="meta"><span class="chip">打开</span></div>
        </a>

        <a class="card" href="SFT.html" id="link-监督微调">
          <div class="row">
            <div class="icon">⚙️</div>
            <div>
              <h3>监督微调数据集</h3>
              <p>监督微调 (SFT) 示例页面</p>
            </div>
          </div>
          <div class="meta"><span class="chip">打开</span></div>
        </a>

        <a class="card" href="PD.html" id="link-偏好数据集">
          <div class="row">
            <div class="icon">📁</div>
            <div>
              <h3>偏好数据集</h3>
              <p>偏好数据集 & 示例</p>
            </div>
          </div>
          <div class="meta"><span class="chip">打开</span></div>
        </a>

        <a class="card" href="label.html" id="link-标签注释">
          <div class="row">
            <div class="icon">📝</div>
            <div>
              <h3>标签注释</h3>
              <p>题库标签和辅助注释页面</p>
            </div>
          </div>
          <div class="meta"><span class="chip">打开</span></div>
        </a>

        
        

     
      </section>

      <div style="margin-top:26px;color:var(--muted);font-size:13px">若某卡片为灰色，请检查本地文件夹内是否有同名HTML文件</div>

    </main>
  </div>

  <script>
    // 检查链接目标是否可访问（在 file:// 下可能被阻止）——改为仅在 http/https 下做 fetch 检测
    const isFileProtocol = location.protocol === 'file:';

    if (isFileProtocol) {
      // 显示顶部提示，说明处于文件系统打开模式
      const topbar = document.querySelector('.topbar');
      if (topbar) {
        const info = document.createElement('div');
        info.style.color = 'var(--muted)';
        info.style.fontSize = '13px';
        info.style.alignSelf = 'center';
        info.textContent = '本地模式（已跳过在线可用性检测）';
        topbar.appendChild(info);
      }
    }

    document.querySelectorAll('.card').forEach(card=>{
      const href = card.getAttribute('href');

      // 跳过没有 href 的卡片（例如开发者名单是交互按钮，不是导航链接）
      if (!href) return;

      if (isFileProtocol) {
        // file:// 环境下浏览器常阻止 fetch 请求，默认假定本地文件可用
        const chip = card.querySelector('.chip'); if(chip) chip.textContent='本地';
        return;
      }

      // 仅在 http/https 下尝试以 HEAD 请求检测文件是否存在
      fetch(href, {method:'HEAD'}).then(resp=>{
        if (!resp.ok) {
          card.classList.add('disabled');
          const chip = card.querySelector('.chip'); if(chip) chip.textContent='缺失';
        }
      }).catch(err=>{
        // 发生错误时不打断体验，标示为可能不可用
        card.classList.add('disabled');
        const chip = card.querySelector('.chip'); if(chip) chip.textContent='可能不可用';
      });
    });

    // 允许键盘回车打开链接（卡片是 <a>，已有回车行为，但增强兼容性）
    document.querySelectorAll('.card').forEach(c=>{
      c.addEventListener('keydown', e=>{
        if(e.key==='Enter' || e.key===' ') c.click();
      });
    });
  </script>

  <script>
    // 开发者名单数据与弹窗交互（数据存储在此文件内）
    (function(){
      const DEVELOPERS = {
        frontend: '董瀚',
        backend: '龚永强',
        others: ''
      };

      function renderDevList(){
        const container = document.getElementById('devList');
        if(!container) return;
        container.innerHTML = '';
        const addLine = (label, value) => {
          const p = document.createElement('p');
          p.innerHTML = `<strong>${label}</strong> ${value || '<span style="color:var(--muted)">（暂无）</span>'}`;
          container.appendChild(p);
        };
        addLine('前端开发：', DEVELOPERS.frontend);
        addLine('后端开发：', DEVELOPERS.backend);
        addLine('其他：', DEVELOPERS.others);
      }

      const toggle = document.getElementById('devToggle');
      const modal = document.getElementById('devModal');
      const closeBtn = document.getElementById('devClose');

      function openModal(){
        renderDevList();
        modal.classList.add('open');
        modal.setAttribute('aria-hidden','false');
        if(closeBtn && typeof closeBtn.focus === 'function') closeBtn.focus();
      }
      function closeModal(){
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden','true');
        if(toggle && typeof toggle.focus === 'function') toggle.focus();
      }
      if(toggle && modal){
        toggle.addEventListener('click', openModal);
        toggle.addEventListener('keydown', e=>{ if(e.key==='Enter' || e.key===' ') openModal();});
        if(closeBtn) closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', e=>{ if(e.target === modal) closeModal();});
        document.addEventListener('keydown', e=>{ if(e.key==='Escape' && modal.classList.contains('open')) closeModal();});
      }
    })();
  </script>
</body>
</html>
